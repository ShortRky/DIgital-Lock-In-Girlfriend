<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Lock-In Girlfriend</title>
    <meta name="description" content="A virtual girlfriend who yells at you for doom scrolling">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1 class="app-title">Digital Lock-In Girlfriend</h1>
            <p class="app-subtitle">She's watching 👀</p>
        </header>

        <!-- Main Video Call Area -->
        <main class="video-call-container">
            <!-- Girlfriend Character -->
            <div class="girlfriend-wrapper">
                <div class="girlfriend-container" id="girlfriend">
                    <!-- Character will be rendered here via CSS -->
                    <div class="character">
                        <div class="hair-back"></div>
                        <div class="face">
                            <div class="hair-front">
                                <div class="hair-bangs"></div>
                                <div class="hair-side left"></div>
                                <div class="hair-side right"></div>
                            </div>
                            <div class="eyes">
                                <div class="eye left">
                                    <div class="iris">
                                        <div class="pupil"></div>
                                        <div class="highlight"></div>
                                    </div>
                                    <div class="eyelid"></div>
                                </div>
                                <div class="eye right">
                                    <div class="iris">
                                        <div class="pupil"></div>
                                        <div class="highlight"></div>
                                    </div>
                                    <div class="eyelid"></div>
                                </div>
                            </div>
                            <div class="eyebrows">
                                <div class="eyebrow left"></div>
                                <div class="eyebrow right"></div>
                            </div>
                            <div class="nose"></div>
                            <div class="mouth">
                                <div class="mouth-inner"></div>
                            </div>
                            <div class="blush left"></div>
                            <div class="blush right"></div>
                        </div>
                        <div class="body">
                            <div class="shoulders"></div>
                        </div>
                    </div>
                    <!-- Speech bubble for scolding -->
                    <div class="speech-bubble" id="speechBubble">
                        <span class="speech-text" id="speechText">Hey! Get back to work!</span>
                    </div>
                </div>
                <!-- Glow effect -->
                <div class="character-glow"></div>
            </div>

            <!-- Timer Display -->
            <div class="timer-container" id="timerContainer">
                <div class="timer-ring">
                    <svg class="timer-svg" viewBox="0 0 100 100">
                        <circle class="timer-bg" cx="50" cy="50" r="45"/>
                        <circle class="timer-progress" id="timerProgress" cx="50" cy="50" r="45"/>
                    </svg>
                    <div class="timer-text">
                        <span class="timer-value" id="timerValue">0</span>
                        <span class="timer-label">seconds</span>
                    </div>
                </div>
                <p class="timer-hint" id="timerHint">Keep looking at me~</p>
            </div>
        </main>

        <!-- Camera Preview -->
        <div class="camera-preview" id="cameraPreview">
            <video id="videoElement" autoplay playsinline muted></video>
            <div class="camera-status" id="cameraStatus">
                <span class="status-dot"></span>
                <span class="status-text">Watching</span>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar">
            <div class="status-item">
                <span class="status-icon">💕</span>
                <span class="status-value" id="moodStatus">Idle</span>
            </div>
            <div class="status-item">
                <span class="status-icon">🔥</span>
                <span class="status-value" id="streakCount">0</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn btn-primary" id="startBtn">
                <span class="btn-icon">📞</span>
                <span class="btn-text">Start Call</span>
            </button>
            <button class="btn btn-danger hidden" id="stopBtn">
                <span class="btn-icon">📵</span>
                <span class="btn-text">End Call</span>
            </button>
        </div>

        <!-- Error Modal -->
        <div class="modal hidden" id="errorModal">
            <div class="modal-content">
                <h2 class="modal-title">Oops!</h2>
                <p class="modal-message" id="errorMessage">Something went wrong</p>
                <button class="btn btn-primary" id="retryBtn">Try Again</button>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p class="loading-text">Loading face detection...</p>
            </div>
        </div>
    </div>

    <!-- face-api.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="animations.js"></script>
    <script src="script.js"></script>
</body>
</html>
